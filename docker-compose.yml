services:
  postgres:
    image: postgres:16-alpine
    container_name: factory-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: factory_dashboard
    ports:
      - "5432:5432"
    volumes:
      - factory-dashboard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factory_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  factory-dashboard-postgres:
